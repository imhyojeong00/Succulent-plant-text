<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cluster System</title>

  <link rel="stylesheet" href="./style.css">

  <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js" defer></script>
  <script src="./script.js" defer></script>
</head>

<body>
  <button id="coord-toggle" aria-label="좌표 보기" title="Coordinate">⊕</button>

  <div id="ui-layer">
    <input
      type="text"
      id="succulent-input"
      placeholder="TYPE A-Z"
      autocomplete="off"
      autocorrect="off"
      autocapitalize="off"
      spellcheck="false"
      autofocus
    >

    <div id="data-log">
      <span>DIST: <span id="dist-val">-</span></span>
      <span>|</span>
      <span>ANGLE: <span id="angle-val">-</span></span>
      <button id="decode-btn">[MUTANT VIEW]</button>
    </div>
  </div>

  <div id="utility-layer">
    <button id="growth-map-btn" title="Growth Map">☷</button>
    <button id="growth-xray-btn" title="Growth X-Ray">⌁</button>
    <button id="receipt-btn" title="Receipt">▤</button>
    <button id="save-btn" title="Save">↓</button>
  </div>

  <div id="growth-map-panel">
    <div id="growth-map-header">
      <span>GENETIC GROWTH MAP</span>
      <button id="growth-map-close">×</button>
    </div>
    <svg id="growth-map-svg" viewBox="0 0 520 520"></svg>
  </div>

  <div id="receipt-panel">
    <div id="receipt-header">
      <span>CLUSTER RECEIPT</span>
      <button id="receipt-close">×</button>
    </div>

    <pre id="receipt-content"></pre>
    <button id="receipt-download">[DOWNLOAD TXT]</button>
  </div>

<div id="render-stage">
  <svg id="growth-branch-layer"></svg>
  <div id="coord-layer"></div>
</div>
</body>

</html>
